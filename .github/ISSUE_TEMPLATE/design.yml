name: Design Request
description: UI, UX, 아트, 연출 관련 작업을 제안합니다.
title: "[Design] "
labels: ["type:design", "status:ready"]
body:
  - type: textarea
    id: context
    attributes:
      label: 현재 맥락
      description: 어느 화면/흐름에 대한 디자인인지 적어주세요.
    validations:
      required: true
  - type: textarea
    id: goal
    attributes:
      label: 목표 경험
      description: 플레이어가 어떤 느낌을 받길 원하는지 적어주세요.
    validations:
      required: true
  - type: textarea
    id: references
    attributes:
      label: 참고 자료
      description: 레퍼런스 링크나 무드 키워드가 있으면 적어주세요.
